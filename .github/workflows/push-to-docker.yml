name: Build and Push to Docker Hub

on:
  push:
    branches:
      - "feature/*" # trigger only on feature branches

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo (like git clone)
      - name: Checkout code
      - uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }} # current feature branch
          base: main # target branch
          title: "Auto PR: ${{ github.ref_name }} → main"
          body: |
            This PR was automatically created from branch **${{ github.ref_name }}** to **main**.
